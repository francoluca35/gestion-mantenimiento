name: gestion_mantenimiento
description: GestionMantenimiento — mantenimiento, stock y eficiencia
publish_to: "none"
version: 0.2.0+5

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  file_picker: ^8.1.7
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: assets/logo.png
    background_color: "#000000"
    theme_color: "#C026FF"
  image_path: assets/logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
